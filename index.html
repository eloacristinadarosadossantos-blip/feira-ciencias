
   <!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Feira de Ciências</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    margin: 0;
    padding: 0;
}

.container {
    background: white;
    max-width: 500px;
    margin: 60px auto;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
}

h1 {
    color: #333;
}

p {
    color: #666;
}

input, select, textarea {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
}

button {
    background: #4facfe;
    color: white;
    border: none;
    padding: 12px;
    width: 100%;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #007bff;
}

footer {
    margin-top: 15px;
    font-size: 12px;
    color: #999;
}
</style>

</head>

<body>

<div class="container">
    <h1>🔬 Avaliação da Feira de Ciências</h1>
    <p>Deixe sua opinião sobre o projeto:</p>

    <input type="text" placeholder="Seu nome">

    <select>
        <option>Nota</option>
        <option>⭐ 1 - Ruim</option>
        <option>⭐⭐ 2 - Regular</option>
        <option>⭐⭐⭐ 3 - Bom</option>
        <option>⭐⭐⭐⭐ 4 - Muito bom</option>
        <option>⭐⭐⭐⭐⭐ 5 - Excelente</option>
    </select>

    <textarea placeholder="Seu comentário..." rows="4"></textarea>

    <button onclick="enviar()">Enviar Avaliação</button>

    <footer>Projeto escolar 💡</footer>
</div>

<script>
function enviar() {
    alert("Avaliação enviada com sucesso! ✅");
}
</script>

</body>
</html>
