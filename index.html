<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Feira de Ciências</title>

<style>
body {
    font-family: Comic Sans MS, Arial;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4, #a18cd1);
    margin: 0;
    text-align: center;
}

/* decoração */
body::before {
    content: "🔬 🧪 🧠 🌟 🚀 ⭐ 💡";
    font-size: 30px;
    display: block;
    margin: 10px;
}

.container {
    background: white;
    max-width: 500px;
    margin: 40px auto;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

h1 {
    color: #ff4d6d;
    font-size: 28px;
}

.personagens {
    font-size: 40px;
    margin-bottom: 10px;
}

input, textarea {
    width: 90%;
    padding: 10px;
    margin: 10px;
    border-radius: 10px;
    border: 2px solid #ddd;
}

/* estrelas */
.estrelas span {
    font-size: 30px;
    cursor: pointer;
    transition: 0.2s;
}

.estrelas span:hover {
    transform: scale(1.3);
}

button {
    background: #ff4d6d;
    color: white;
    border: none;
    padding: 12px;
    width: 90%;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #ff1e4d;
}

footer {
    margin-top: 15px;
    font-size: 12px;
    color: gray;
}
</style>

</head>

<body>

<div class="container">

    <div class="personagens">
        🤓🧪🧑‍🔬🐰🦆🚀
    </div>

    <h1>🔬 Avaliação da Feira de Ciências</h1>

    <input type="text" placeholder="Seu nome">

    <p>⭐ Avalie o projeto:</p>

    <div class="estrelas">
        <span onclick="nota(1)">⭐</span>
        <span onclick="nota(2)">⭐</span>
        <span onclick="nota(3)">⭐</span>
        <span onclick="nota(4)">⭐</span>
        <span onclick="nota(5)">⭐</span>
    </div>

    <p id="valorNota"></p>

    <textarea placeholder="Comentário"></textarea>

    <button onclick="enviar()">Enviar 🚀</button>

    <footer>Projeto divertido da feira 💡</footer>

</div>

<script>
let notaSelecionada = 0;

function nota(valor){
    notaSelecionada = valor;
    document.getElementById("valorNota").innerText =
    "Você deu " + valor + " estrelas ⭐";
}

function enviar(){
    if(notaSelecionada == 0){
        alert("Escolha uma nota ⭐");
    } else {
        alert("Avaliação enviada! 🎉");
    }
}
</script>

</body>
</html>
